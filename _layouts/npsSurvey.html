<!DOCTYPE html>
<html lang="en">
<head>
        {% include head.html %}

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback</title>

  <style>
   
    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      resize: none;
      margin-bottom: 16px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tag {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }

    .tag.selected {
      background: #111;
      color: white;
      border-color: #111;
    }

    .FeedbackButton {
      width: 100%;
      padding: 12px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .FeedbackButton:hover {
      background: #333;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 12px;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

      {% include header.html %}
     
      <div class="container-fluid container-middle">
        <main class="page-content" aria-label="Content">
            <div class="wrapper">
            <p style="margin:0 0 4px 0;font-size:13px;font-weight:700;color:#1a1a2e;font-family:Arial,Helvetica,sans-serif;">How likely are you to recommend Enhanced Export PRO?</p>
            <p style="margin:0 0 14px 0;font-size:12px;color:#5f5e5a;font-family:Arial,Helvetica,sans-serif;">Select a number from 0 (not at all) to 10 (extremely likely)</p>

            <!-- NPS buttons — single row -->
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:10px;">
              <tbody><tr>
                <td style="padding:0 3px 0 0;"><button onclick="selectScore(0)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">0</button></td>
                <td style="padding:0 3px 0 0;"><button onclick="selectScore(1)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">1</button></td>
                <td style="padding:0 3px 0 0;"><button onclick="selectScore(2)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">2</button></td>
                <td style="padding:0 3px 0 0;"><button onclick="selectScore(3)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">3</button></td>
                <td style="padding:0 3px 0 0;"><button onclick="selectScore(4)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">4</button></td>
                <td style="padding:0 3px 0 0;"><button onclick="selectScore(5)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">5</button></td>
                <td style="padding:0 3px 0 0;"><button onclick="selectScore(6)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">6</button></td>
                <td style="padding:0 3px 0 0;"><button onclick="selectScore(7)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">7</button></td>
                <td style="padding:0 3px 0 0;"><button onclick="selectScore(8)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">8</button></td>
                <td style="padding:0 3px 0 0;"><button onclick="selectScore(9)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">9</button></td>
                <td style="padding:0;"><button onclick="selectScore(10)" style="display:flex;align-items:center;justify-content:center;width:38px;height:34px;background-color:#ffffff;border:1px solid #d3d1c7;border-radius:6px;font-size:12px;font-weight:600;color:#444441;cursor:pointer;font-family:Arial,Helvetica,sans-serif;">10</button></td>
              </tr>
            </tbody></table>

            <!-- Scale labels -->
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
              <tbody><tr>
                <td style="font-size:10px;color:#b4b2a9;font-family:Arial,Helvetica,sans-serif;">Not at all likely</td>
                <td align="right" style="font-size:10px;color:#b4b2a9;font-family:Arial,Helvetica,sans-serif;">Extremely likely</td>
              </tr>
            </tbody></table>
          </div>

          <h1 id="title"></h1>
          <p id="subtitle"></p>

          <textarea id="feedback" placeholder=""></textarea>

          <div class="tags" id="tags"></div>

          <button class="FeedbackButton" onclick="submitFeedback()">Send feedback</button>

          <div class="footer">Takes 10 seconds · Read by our product team</div>
        </div>
      </div>
    </div>
  </div>




     {% include footer.html %}

<script>
  const productNames = {
    "EEP": "Enhanced Export Pro",
    "QTP": "Query Tile Pro",
    "WKP": "Wiki Pro",
  };

  const params = new URLSearchParams(window.location.search);
  let score = parseInt(params.get("npsScore"));
  const product = params.get("product");

  const title = document.getElementById("title");
  const subtitle = document.getElementById("subtitle");
  const textarea = document.getElementById("feedback");
  const tagsContainer = document.getElementById("tags");

  let selectedTags = [];

  function createTags(options) {
    tagsContainer.innerHTML = "";
    options.forEach(option => {
      const el = document.createElement("div");
      el.className = "tag";
      el.innerText = option;

      el.onclick = () => {
        el.classList.toggle("selected");
        if (selectedTags.includes(option)) {
          selectedTags = selectedTags.filter(t => t !== option);
        } else {
          selectedTags.push(option);
        }
      };

      tagsContainer.appendChild(el);
    });
  }

  function redrawForm() {
    selectedTags = [];
    textarea.value = '';
    
    if (score >= 9) {
      title.innerText = "Awesome — thank you!";
      subtitle.innerText = `What did you love about ${productNames[product] || product}?`;
      textarea.placeholder = "What stood out most?";
      createTags(["Ease of use", "Features", "Support", "Performance"]);

    } else if (score >= 7) {
      title.innerText = "Thanks — we're close!";
      subtitle.innerText = `You rated ${productNames[product] || product} ${score}/10. What's missing?`;
      textarea.placeholder = "What could we improve to make it a 9 or 10?";
      createTags(["Missing features", "Bugs", "Hard to use", "Pricing", "Performance", "Support"]);

    } else {
      title.innerText = "Sorry we missed the mark";
      subtitle.innerText = `What went wrong with ${productNames[product] || product}?`;
      textarea.placeholder = "Tell us what didn't work...";
      createTags(["Buggy", "Hard to use", "Too expensive", "Missing features", "Lack of documentation", "Poor support"]);
    }

    updateActiveButton();
  }

  function selectScore(newScore) {
    score = newScore;
    const newUrl = new URL(window.location);
    newUrl.searchParams.set('npsScore', newScore);
    window.history.replaceState({}, '', newUrl);
    redrawForm();
  }

  function updateActiveButton() {
    document.querySelectorAll('button[onclick^="selectScore"]').forEach(btn => {
      const btnText = btn.innerText;
      if (parseInt(btnText) === score) {
        btn.style.backgroundColor = '#1a1a2e';
        btn.style.borderColor = '#1a1a2e';
        btn.style.color = '#ffffff';
      } else {
        btn.style.backgroundColor = '#ffffff';
        btn.style.borderColor = '#d3d1c7';
        btn.style.color = '#444441';
      }
    });
  }

  if (!isNaN(score)) {
    redrawForm();
  }

  function submitFeedback() {
    const feedback = textarea.value;

    if (window.appInsights) {
      window.appInsights.trackEvent(
        { name: 'NpsFeedbackSubmitted' },
        {
          npsScore: String(score),
          product: productNames[product] || product,
          source: params.get('source') || '',
          tags: selectedTags.join(','),
          hasFeedback: feedback.trim().length > 0 ? 'true' : 'false'
        }
      );
    }

    document.querySelector(".card").innerHTML = `
      <h1>Thank you 🙏</h1>
      <p>Your feedback helps us improve.</p>
    `;
  }



  // Application Insights — load SDK and post NpsScoreSelected on page load
  (function () {
    var respectDnt = true;
    var dntEnabled =
      navigator.doNotTrack === '1' ||
      window.doNotTrack === '1' ||
      navigator.msDoNotTrack === '1';

    if (respectDnt && dntEnabled) { return; }
    if (!params.get('npsScore')) { return; }

    var script = document.createElement('script');
    script.src = 'https://js.monitor.azure.com/scripts/b/ai.2.min.js';
    script.async = true;
    script.onload = function () {
      var instance = new Microsoft.ApplicationInsights.ApplicationInsights({
        config: {
          connectionString: 'InstrumentationKey=3524666c-4b6a-4408-9cb7-d3fe88c3c1bf;IngestionEndpoint=https://westeurope-5.in.applicationinsights.azure.com/;LiveEndpoint=https://westeurope.livediagnostics.monitor.azure.com/;ApplicationId=99a4fa13-2d52-4a4a-bf9c-0e02bf1bc11e',
          disableCookiesUsage: true,
          isStorageUseDisabled: true,
          enableSessionStorageBuffer: false,
          disableExceptionTracking: true,
          disableAjaxTracking: true,
          disableFetchTracking: true,
          disableCorrelationHeaders: true,
          autoTrackPageVisitTime: false
        }
      });
      instance.loadAppInsights();
      window.appInsights = instance;

      window.appInsights.trackEvent(
        { name: 'NpsScoreSelected' },
        {
          npsScore: params.get('npsScore'),
          product: productNames[product] || product,
          source: params.get('source') || '',
          page: window.location.pathname
        }
      );
    };
    document.head.appendChild(script);
  })();
</script>

</body>
</html>
